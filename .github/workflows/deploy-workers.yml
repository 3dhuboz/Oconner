      - name: Deploy worker
        run: pnpm --filter @butcher/worker-pdf-generator run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-route-proxy:
    name: Deploy Route Proxy
    runs-on: ubuntu-latest
    steps:
